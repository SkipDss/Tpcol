		<main>
			<section class="section-info">
				<ul class="section-info__list">
					<li class="section-info__item"><p>12.03.2026</p></li>
					<li class="section-info__item">
						<button class="button button--purple">ВП-22</button>

					<li class="section-info__item"><p>Красная неделя</p></li>
				</ul>
			</section>
			<section class="section-schedule">
				<!-- неделя -->
				<div class="section-schedule__week">
					<ul class="section-schedule__week-list">
						<li class="section-schedule__week-item">
							<button class="button">Пн</button>
						</li>
						<li class="section-schedule__week-item">
							<button class="button button--active">Вт</button>
						</li>
						<li class="section-schedule__week-item">
							<button class="button">Ср</button>
						</li>
						<li class="section-schedule__week-item">
							<button class="button button--active">Чт</button>
						</li>
						<li class="section-schedule__week-item">
							<button class="button">Пт</button>
						</li>

							<button class="button button--active">Сб</button>
						</li>
					</ul>
				</div>
				<div class="section-schedule__lessons">
					<ol class="section-schedule__lessons-list">

							<ul class="lesson-card__info-list">

								</li>
							</ul>

				</div>

							viewBox="0 0 35 35"
							fill="none"
							xmlns="http://www.w3.org/2000/svg">
